lang: en-EN
fontsize: 12pt
institute: IE University
urlcolor: blue
linkcolor: blue
citecolor: blue
sansfont: Latin Modern Roman

format:
  revealjs:
    theme: serif
    fig-align: center
    self-contained: true
    css: "../../assets/custom_v2.css"
    toc: true
    code-fold: true
    code-summary: "Check the code"
    toc-title: "Content"
    toc-location: left
    toc-depth: 1
    slide-number: true
    slide-level: 3
    link-external-newwindow: true
    preview-links: true
    auto-stretch: false
    transition: fade
    math: mathjax
    html-math-method: mathjax
    number-sections: true
    df-print: paged

  beamer:
    classoption:
      - aspectratio=169
    theme: CambridgeUS
    colortheme: beaver
    toc: true
    slide-level: 3
    incremental: true
    pdf-engine: lualatex
    df-print: kable
    highlight-style: tango
    template: ../../templates/template_beamer_norecap.tex
    keep-tex: true
    knitr:
      opts_chunk:
        dev: cairo_pdf
        echo: false

editor: source
bibliography: ../../references/references.bib
csl: ../../references/apa.csl
echo: true
